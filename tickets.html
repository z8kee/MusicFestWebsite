<!DOCTYPE html>
<html>
    <head>
    <title>
        Schedule
    </title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    </head>
    <body>

    <header>
        <img src="pictures/black-texture.jpg" class="bg-image">
        <h1 style="top: -14vh; left: -10vh; transform: scale(0.4);">MusicFest</h1>
        
        <a href="index.html" class="circlelogo">
            <img src="pictures/musicfest2025.png" class="logo-image">   
        </a>

        <div class="topfade-solid-box" style="top: 0vh; height: 400%; z-index:2"></div>
    </header>

    <nav>
        <div class="dot-menu" id="dotMenu">
            <img src="pictures/3lines.png" class="dot-menu-image" id="dotToggle" role="button">
            <div class="dropdown" id="dotDropdown">
                <a href="index.html">Home</a>
                <a href="lineup.html">Lineup</a>
                <a href="tickets.html">Tickets</a>
                <a href="schedule.html">Schedule</a>
            </div>
        </div>
    </nav>

    <main class="tickets-container">

        <article style="z-index: 9;">
            <figure>
                <img src="pictures/musicfest2025.png" alt="MusicFest Tickets" style="width:100%; border-radius:10px;">
                <figcaption style = "right: -20%">Secure your place at MusicFest 2025.</figcaption>
            </figure>
            <p style="font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif">
                Choose your ticket, complete the booking form, and get ready for the biggest music event of the year.
            </p>
        </article>

        <section>
            <h2 style = 'font-family: iammusic; font-size: 13px; left: 41%'>Book Your Tickets</h2>

            <form id="ticketForm" novalidate>

                <label>Full Name
                    <input type="text" id="name">
                    <div class="error" id="nameError"></div>
                </label>

                <label>Email Address
                    <input type="email" id="email">
                    <div class="error" id="emailError"></div>
                </label>

                <label>Phone Number
                    <input type="tel" id="phone">
                    <div class="error" id="phoneError"></div>
                </label>

                <label>Number of Tickets
                    <input type="number" id="tickets" min="1" max="10">
                    <div class="error" id="ticketsError"></div>
                </label>

                <label>Ticket Type
                    <select id="ticketType">
                        <option value="">Select Ticket Type</option>
                        <option>General Admission</option>
                        <option>VIP</option>
                        <option>Premium</option>
                    </select>
                    <div class="error" id="ticketTypeError"></div>
                </label>
                <label>Who do you want to see?
                    <select id="artist">
                        <option value="">Select Artist</option>
                        <option>Gunna and Carti</option>
                        <option>Future and Autumn!</option>
                        <option>21 Savage and Drake</option>

                    </select>
                    <div class="error" id="artistError"></div>
                </label>
                <label>Payment Method
                    <select id="payment">
                        <option value="">Select Payment Method</option>
                        <option>Credit Card</option>
                        <option>Debit Card</option>
                        <option>PayPal</option>
                    </select>
                    <div class="error" id="paymentError"></div>
                </label>

                <label>Special Requirements
                    <textarea id="requirements"></textarea>
                </label>

                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="terms"> I agree to the Terms & Conditions
                    </label>
                    <div class="error" id="termsError"></div>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="submit-btn">Submit</button>
                    <button type="reset" class="reset-btn">Reset</button>
                </div>

                <div class="success" id="successMessage"></div>

            </form>
        </section>

    </main>
    <footer>
        &copy; MusicFest 2025. All rights reserved.
    </footer>
    <script src="dot-menu.js"></script>
    <script src="tickets.js"></script>
    <div class="top-footer">
        <p>MusicFest | Mayhem</p>
    </div>
</html>
